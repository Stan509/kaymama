<tr class="group hover:bg-[#0f2b46]/2 transition">
    <td class="py-4 px-6 font-bold text-navy flex items-center gap-3">
        {% if dish.image %}
            <img src="{{ dish.image.url }}" class="w-10 h-10 rounded-lg object-cover">
        {% else %}
            <div class="w-10 h-10 rounded-lg bg-navy/5 flex items-center justify-center text-xs">🍽️</div>
        {% endif %}
        <span>{{ dish.name }}</span>
    </td>
    <td class="py-4 px-6 text-navy/70 text-xs">
        {{ dish.category.name }}
    </td>
    <td class="py-4 px-6 text-center font-semibold text-navy">
        {{ dish.price }} €
    </td>
    <td class="py-4 px-6 text-center">
        <!-- Quick inline stock update form -->
        <form hx-post="{% url 'dashboard:update_dish_stock' dish.id %}"
              hx-target="closest tr"
              hx-swap="outerHTML"
              class="flex items-center justify-center gap-1">
              {% csrf_token %}
              <input type="number" name="stock" value="{{ dish.stock_level }}" class="w-16 text-center bg-[#F7F3EC]/50 border border-[#0F2B46]/10 rounded-lg py-1 px-1.5 focus:outline-none focus:border-[#B87333]">
              <button type="submit" class="bg-navy text-cream rounded-lg p-1 hover:opacity-90 transition text-xs">💾</button>
        </form>
    </td>
    <td class="py-4 px-6 text-center">
        <span class="font-bold text-xs uppercase px-2.5 py-1 rounded-full text-cream 
            {% if dish.is_available %} bg-green {% else %} bg-red-600 {% endif %}">
            {% if dish.is_available %} En Stock {% else %} Épuisé {% endif %}
        </span>
    </td>
    <td class="py-4 px-6 text-right">
        <a href="/admin/menu/dish/{{ dish.id }}/change/" class="text-xs font-semibold text-copper hover:underline">
            Éditer complet ➔
        </a>
    </td>
</tr>
